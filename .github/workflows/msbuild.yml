name: MSBuild

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    # Checkout repo
    - uses: actions/checkout@v4

    # Setup MSBuild (GitHub certified)
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1
      with:
        vs-version: latest

    # Setup NuGet (GitHub certified)
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1
      with:
        nuget-version: 'latest'

    # Restore NuGet packages with caching
    - name: Restore NuGet packages
      run: nuget restore ${{ env.SOLUTION_FILE_PATH }}

    # Build solution
    - name: Build solution
      run: msbuild ${{ env.SOLUTION_FILE_PATH }} /m /p:Configuration=${{ env.BUILD_CONFIGURATION }}
